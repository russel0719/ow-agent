name: Update OW Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # 매일 15:00 KST (06:00 UTC)
  workflow_dispatch:        # 수동 트리거

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Generate data
        run: uv run python scripts/generate_data.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          # 매일 갱신 데이터를 Supabase(ow_agent)에 저장 (미설정 시 로컬 파일 폴백)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Generate pages (SEO/정적 콘텐츠/sitemap)
        run: uv run python scripts/generate_pages.py

      - name: Commit lookup changes (heroes/maps only)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 매일 재생성되는 정적 페이지·데이터는 Pages 아티팩트로 배포되므로 커밋하지 않는다.
          # 신규 영웅/맵으로 lookup(heroes.json·maps.json)이 바뀔 때만 커밋해 영구 보존.
          git add data/heroes.json public/data/heroes.json public/data/maps.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update hero/map lookups [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          else
            echo "lookup 변경 없음 — 커밋 생략"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN 미설정 — Vercel 배포 생략 (Pages 배포는 완료)"
            exit 0
          fi
          # Pages 아티팩트와 동일한 public/ 을 Vercel에도 올린다. Build Output API(v3)로
          # 직접 구성해 --prebuilt 로 업로드하면 Vercel의 프레임워크 자동 감지를 건너뛴다
          # (repo 루트의 pyproject.toml 을 Python 앱으로 오탐해 빌드가 깨지던 문제 회피).
          mkdir -p .vercel/output/static
          cp -r public/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json
          npx --yes vercel@latest deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
