name: Update OW Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # 매일 15:00 KST (06:00 UTC)
  workflow_dispatch:        # 수동 트리거

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Generate data
        run: uv run python scripts/generate_data.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          # 매일 갱신 데이터를 Supabase(ow_agent)에 저장 (미설정 시 로컬 파일 폴백)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Generate pages (SEO/정적 콘텐츠/sitemap)
        run: uv run python scripts/generate_pages.py

      - name: Commit lookup changes (heroes/maps only)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 매일 재생성되는 정적 페이지·데이터는 Pages 아티팩트로 배포되므로 커밋하지 않는다.
          # 신규 영웅/맵으로 lookup(heroes.json·maps.json)이 바뀔 때만 커밋해 영구 보존.
          git add data/heroes.json public/data/heroes.json public/data/maps.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update hero/map lookups [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          else
            echo "lookup 변경 없음 — 커밋 생략"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
