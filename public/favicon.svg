<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="barCenter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCD3C"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="barSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DD9F7"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Hexagon frame (OW aesthetic) -->
  <polygon
    points="32,5 54,17.5 54,42.5 32,55 10,42.5 10,17.5"
    fill="#F5A623" fill-opacity="0.07"
    stroke="#F5A623" stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- Bar chart — left (blue, short) -->
  <rect x="14" y="37" width="9" height="14" rx="2.5" fill="url(#barSide)" opacity="0.85"/>

  <!-- Bar chart — center (orange, tallest) -->
  <rect x="27.5" y="23" width="9" height="28" rx="2.5" fill="url(#barCenter)" filter="url(#glow)"/>

  <!-- Bar chart — right (blue, medium) -->
  <rect x="41" y="31" width="9" height="20" rx="2.5" fill="url(#barSide)" opacity="0.7"/>

  <!-- Trend line connecting bar tops -->
  <polyline
    points="18.5,37 32,23 45.5,31"
    stroke="white" stroke-width="2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.35"
  />

  <!-- Trend arrow tip -->
  <circle cx="45.5" cy="31" r="2" fill="white" opacity="0.35"/>
</svg>
